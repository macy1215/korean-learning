function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function getToday() { return new Date().toDateString(); }

// ============ STORAGE HOOK ============
function useProgress() {
  const [progress, setProgress] = useState(() => {
    try { const s = localStorage.getItem('kor_prog_v1'); return s ? JSON.parse(s) : {totalAnswered:0,totalCorrect:0,learnedWords:[],wrongAnswers:{},dailyStats:{}}; }
    catch { return {totalAnswered:0,totalCorrect:0,learnedWords:[],wrongAnswers:{},dailyStats:{}}; }
  });
  useEffect(() => { try { localStorage.setItem('kor_prog_v1', JSON.stringify(progress)); } catch {} }, [progress]);

  const today = getToday();
  const todayStats = progress.dailyStats[today] || {answered:0,correct:0};

  const recordAnswer = useCallback((word, isCorrect) => {
    setProgress(prev => {
      const dayStats = prev.dailyStats[today] || {answered:0,correct:0};
      const learned = prev.learnedWords || [];
      const wrongs = {...(prev.wrongAnswers||{})};
      if (!isCorrect) {
        const ex = wrongs[word.id] || {count:0};
        wrongs[word.id] = {korean:word.korean,chinese:word.chinese,category:word.category,papago:word.papago,pos:word.pos,count:ex.count+1,lastWrong:new Date().toISOString()};
      }
      return {
        ...prev,
        totalAnswered: (prev.totalAnswered||0)+1,
        totalCorrect: (prev.totalCorrect||0)+(isCorrect?1:0),
        learnedWords: isCorrect && !learned.includes(word.id) ? [...learned,word.id] : learned,
        wrongAnswers: wrongs,
        dailyStats: {...prev.dailyStats,[today]:{answered:dayStats.answered+1,correct:dayStats.correct+(isCorrect?1:0)}}
      };
    });
  }, [today]);

  const removeFromWrong = useCallback((id) => {
    setProgress(prev => { const w = {...prev.wrongAnswers}; delete w[id]; return {...prev,wrongAnswers:w}; });
  }, []);

  const wrongList = Object.entries(progress.wrongAnswers||{}).map(([id,d]) => ({id:parseInt(id),...d})).sort((a,b)=>b.count-a.count);
  const acc = progress.totalAnswered > 0 ? Math.round(progress.totalCorrect/progress.totalAnswered*100) : 0;
  const todayAcc = todayStats.answered > 0 ? Math.round(todayStats.correct/todayStats.answered*100) : 0;

  return {progress,todayStats,todayAcc,acc,learnedCount:(progress.learnedWords||[]).length,wrongList,recordAnswer,removeFromWrong,
    resetProgress:()=>setProgress({totalAnswered:0,totalCorrect:0,learnedWords:[],wrongAnswers:{},dailyStats:{}})};
}

// ============ PAPAGO BUTTON ============
function SpeakBtn({word, small}) {
  const [playing, setPlaying] = useState(false);
  const doSpeak = (e) => {
    e.stopPropagation();
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(word.korean);
    u.lang = 'ko-KR'; u.rate = 0.85; u.pitch = 1;
    u.onstart = () => setPlaying(true);
    u.onend = () => setPlaying(false);
    u.onerror = () => setPlaying(false);
    window.speechSynthesis.speak(u);
    setPlaying(true);
  };
  const s = small ? {
    display:'inline-flex',alignItems:'center',gap:'3px',padding:'2px 8px',fontSize:'11px',
    background: playing ? '#dbeafe' : '#eff6ff',
    color: playing ? '#1d4ed8' : '#3b82f6',
    border:`1px solid ${playing ? '#93c5fd' : '#bfdbfe'}`,
    borderRadius:'999px',cursor:'pointer',transition:'all 0.15s',fontFamily:'inherit'
  } : {
    display:'inline-flex',alignItems:'center',gap:'5px',padding:'6px 12px',fontSize:'13px',
    background: playing ? '#dbeafe' : '#eff6ff',
    color: playing ? '#1d4ed8' : '#3b82f6',
    border:`1px solid ${playing ? '#93c5fd' : '#bfdbfe'}`,
    borderRadius:'12px',cursor:'pointer',transition:'all 0.15s',fontFamily:'inherit'
  };
  return (
    <button style={s} onClick={doSpeak} title="點我聽發音">
      {playing ? '🔊' : '🔈'} {small ? '聽發音' : '點我聽發音'}

  );
}

// ============ SPEAK ============
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.85; u.pitch = 1;
  window.speechSynthesis.speak(u);
}

// ============ QUIZ CARD ============
function QuizCard({words, mode, onAnswer}) {
  const [current, setCurrent] = useState(null);
  const [options, setOptions] = useState([]);
  const [selected, setSelected] = useState(null);
  const [input, setInput] = useState('');
  const [result, setResult] = useState(null);
  const [showAns, setShowAns] = useState(false);
  const [key, setKey] = useState(0);

  function next() {
    if (!words || words.length < 4) return;
    const w = words[Math.floor(Math.random()*words.length)];
    const others = shuffle(words.filter(x=>x.id!==w.id)).slice(0,3);
    setCurrent(w); setOptions(shuffle([w,...others]));
    setSelected(null); setInput(''); setResult(null); setShowAns(false);
    setKey(k=>k+1);
  }

  useEffect(()=>{ next(); }, [words, mode]);

  if (!current) return <div style={{textAlign:'center',padding:'32px',color:'#94a3b8'}}>載入中...</div>;

  const handleSelect = (opt) => {
    if (result) return;
    setSelected(opt);
    const ok = opt.id===current.id;
    setResult(ok?'correct':'wrong');
    onAnswer(current, ok);
  };
  const handleInput = () => {
    if (result || !input.trim()) return;
    const ok = input.trim() === current.korean;
    setResult(ok?'correct':'wrong');
    setShowAns(true);
    onAnswer(current, ok);
  };

  const cardBg = result==='correct'?'#f0fdf4':result==='wrong'?'#fff1f2':'white';
  const cardBorder = result==='correct'?'#a7f3d0':result==='wrong'?'#fecdd3':'#e0f2fe';

  return (
    <div key={key} className="fade-in" style={{background:cardBg,border:`2px solid ${cardBorder}`,borderRadius:'16px',padding:'24px',transition:'all 0.3s'}}>
      <div style={{textAlign:'center',marginBottom:'20px'}}>
        <div style={{fontSize:'11px',color:'#94a3b8',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'8px'}}>
          {mode==='ko-to-cn'?'看韓文，選中文意思':'看中文，輸入韓文'}
        </div>
        {mode==='ko-to-cn' ? (
          <>
            <div className="korean" style={{fontSize:'40px',fontWeight:'700',color:'#1e293b',marginBottom:'4px'}}>{current.korean}</div>
            {current.hint && <div style={{fontSize:'13px',color:'#94a3b8'}}>發音提示：{current.hint}</div>}
          </>
        ) : (
          <>
            <div style={{fontSize:'32px',fontWeight:'700',color:'#1e293b',marginBottom:'4px'}}>{current.chinese}</div>
            {current.pos && <div style={{fontSize:'13px',color:'#0ea5e9'}}>{current.pos}</div>}
          </>
        )}
      </div>

      {mode==='ko-to-cn' ? (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'16px'}}>
          {options.map(opt => {
            let bg='#f0f9ff',border='#e0f2fe',color='#334155';
            if (result) {
              if (opt.id===current.id) {bg='#d1fae5';border='#34d399';color='#065f46';}
              else if (opt.id===selected?.id) {bg='#ffe4e6';border='#f87171';color='#9f1239';}
              else {bg='#f8fafc';border='#e2e8f0';color='#94a3b8';}
            }
            return (
              <button key={opt.id} onClick={()=>handleSelect(opt)} disabled={!!result}
                style={{padding:'12px',fontSize:'13px',fontWeight:'500',borderRadius:'12px',
                  border:`2px solid ${border}`,background:bg,color,textAlign:'left',
                  cursor:result?'default':'pointer',transition:'all 0.15s',fontFamily:'inherit'}}>
                {opt.chinese}
              </button>
            );
          })}
        </div>
      ) : (
        <div style={{marginBottom:'12px'}}>
          <input className="korean" value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&!result&&handleInput()}
            placeholder="輸入韓文..." disabled={!!result}
            style={{width:'100%',border:'2px solid #bae6fd',borderRadius:'12px',padding:'12px 16px',
              fontSize:'20px',background:'#f0f9ff',fontFamily:"'Noto Sans KR',sans-serif",
              marginBottom:'8px',display:'block'}} />
          <button onClick={handleInput} disabled={!!result||!input.trim()}
            style={{width:'100%',padding:'12px',background:'#0ea5e9',color:'white',borderRadius:'12px',
              opacity:result||!input.trim()?0.4:1,fontSize:'15px',fontWeight:'600',fontFamily:'inherit'}}>確認</button>
          {showAns && result==='wrong' && (
            <div style={{marginTop:'8px',fontSize:'13px',color:'#e11d48'}}>
              正確答案：<span className="korean" style={{fontWeight:'700'}}>{current.korean}</span>
            </div>
          )}
        </div>
      )}

      {result && (
        <div className="fade-in" style={{marginBottom:'12px'}}>
          <div style={{textAlign:'center',fontSize:'13px',fontWeight:'600',marginBottom:'8px',
            color:result==='correct'?'#059669':'#e11d48'}}>
            {result==='correct'?'✓ 答對了！':'✗ 答錯了，加油！'}
          </div>
          <div style={{background:'white',borderRadius:'12px',border:'1px solid #e0f2fe',padding:'12px',fontSize:'13px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'6px'}}>
              <span className="korean" style={{fontWeight:'700',fontSize:'18px'}}>{current.korean}</span>
              <span style={{color:'#64748b'}}>{current.chinese}</span>
              {current.pos && <span style={{fontSize:'11px',background:'#e0f2fe',color:'#0284c7',padding:'2px 8px',borderRadius:'999px'}}>{current.pos}</span>}
            </div>
            {current.example && <div style={{color:'#64748b',marginBottom:'6px'}}>
              <span className="korean">{current.example}</span>
              {current.exampleCn && <span style={{color:'#94a3b8'}}> （{current.exampleCn}）</span>}
            </div>}
            <WordButtons word={current} small />
          </div>
        </div>
      )}

      <button onClick={next} disabled={!result}
        style={{width:'100%',padding:'10px',borderRadius:'12px',fontSize:'13px',fontWeight:'600',
          background:result?'linear-gradient(to right,#0ea5e9,#3b82f6)':'#f1f5f9',
          color:result?'white':'#94a3b8',cursor:result?'pointer':'not-allowed',transition:'all 0.2s',
          fontFamily:'inherit'}}>
        下一題 →
      </button>
    </div>
  );
}

            <span className="korean" style={{fontWeight:'700',fontSize:'20px'}}>{current.korean}</span>

// ============ TRANSLATION ============
function TranslationPractice({onAnswer}) {
  const [shuffled] = useState(()=>shuffle(translationQs));
  const [idx, setIdx] = useState(0);
  const [input, setInput] = useState('');
  const [result, setResult] = useState(null);

  const cur = shuffled[idx%shuffled.length];

  const check = () => {
    if (result) return;
    const ok = input.trim()===cur.answer;
    setResult(ok?'correct':'wrong');
    onAnswer({id:`t_${cur.id}`,korean:cur.answer,chinese:cur.chinese,category:cur.category,papago:cur.answer}, ok);
  };

  const next = () => { setIdx(i=>i+1); setInput(''); setResult(null); };
  const pWord = {korean:cur.answer,papago:cur.answer,chinese:cur.chinese};

  return (
    <div className="fade-in" style={{background:'white',border:'2px solid #e0f2fe',borderRadius:'16px',padding:'24px'}}>
      <div style={{fontSize:'11px',color:'#94a3b8',textAlign:'center',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'16px'}}>小翻譯練習</div>
      <div style={{background:'linear-gradient(135deg,#faf5ff,#f3e8ff)',borderRadius:'12px',padding:'20px',marginBottom:'12px',textAlign:'center',border:'1px solid #e9d5ff'}}>
        <div style={{fontSize:'26px',fontWeight:'700',color:'#7c3aed',marginBottom:'4px'}}>{cur.chinese}</div>
        <div style={{fontSize:'12px',color:'#a78bfa'}}>請翻譯成韓文</div>
      </div>
      <div style={{fontSize:'12px',color:'#7c3aed',background:'#faf5ff',padding:'8px 12px',borderRadius:'8px',marginBottom:'12px',border:'1px solid #e9d5ff'}}>📌 提示：{cur.hint}</div>
      <div style={{marginBottom:'8px'}}>
        <input className="korean" value={input} onChange={e=>setInput(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&!result&&check()}
          placeholder="輸入韓文翻譯..." disabled={!!result}
          style={{width:'100%',border:'2px solid #bae6fd',borderRadius:'12px',padding:'12px 16px',fontSize:'18px',background:'#f0f9ff',fontFamily:"'Noto Sans KR',sans-serif",display:'block',marginBottom:'8px'}} />
        <button onClick={check} disabled={!!result||!input.trim()}
          style={{width:'100%',padding:'12px',background:'#7c3aed',color:'white',borderRadius:'12px',opacity:result||!input.trim()?0.4:1,fontSize:'15px',fontWeight:'600',fontFamily:'inherit'}}>確認</button>
      </div>
      {result && <div className="fade-in">
        <div style={{fontSize:'13px',fontWeight:'600',marginBottom:'6px',color:result==='correct'?'#059669':'#e11d48'}}>
          {result==='correct'?'✓ 正確！':'✗ 答錯了'}
        </div>
        <div style={{background:result==='wrong'?'#fff1f2':'#d1fae5',borderRadius:'12px',padding:'12px',border:`1px solid ${result==='wrong'?'#fecdd3':'#a7f3d0'}`,marginBottom:'8px'}}>
          <div style={{fontSize:'11px',color:'#94a3b8',marginBottom:'2px'}}>正確答案</div>
          <div className="korean" style={{fontWeight:'700',fontSize:'20px'}}>{cur.answer}</div>
        </div>
        <WordButtons word={pWord} small />
      </div>}
      <button onClick={next} disabled={!result}
        style={{width:'100%',marginTop:'16px',padding:'10px',borderRadius:'12px',fontSize:'13px',fontWeight:'600',
          background:result?'linear-gradient(to right,#7c3aed,#9333ea)':'#f1f5f9',
          color:result?'white':'#94a3b8',cursor:result?'pointer':'not-allowed',fontFamily:'inherit'}}>
        下一題 →
      </button>
    </div>
  );
}

// ============ VOCAB BROWSER ============
function VocabBrowser({words}) {
  const [search, setSearch] = useState('');
  const [expandedId, setExpandedId] = useState(null);
  const filtered = words.filter(w=>!search||w.korean.includes(search)||w.chinese.includes(search));

  return (
    <div>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋韓文或中文..."
        style={{width:'100%',border:'2px solid #bae6fd',borderRadius:'12px',padding:'10px 16px',
          fontSize:'14px',background:'#f0f9ff',marginBottom:'12px',fontFamily:'inherit'}} />
      <div style={{fontSize:'12px',color:'#94a3b8',marginBottom:'8px'}}>共 {filtered.length} 筆</div>
      <div style={{maxHeight:'55vh',overflowY:'auto',paddingRight:'4px',display:'flex',flexDirection:'column',gap:'6px'}}>
        {filtered.map(w=>(
          <div key={`${w.id}-${w.korean}`} onClick={()=>setExpandedId(expandedId===w.id?null:w.id)}
            style={{background:'white',borderRadius:'12px',border:'1px solid #e0f2fe',padding:'12px',cursor:'pointer',transition:'all 0.15s'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                  <span className="korean" style={{fontWeight:'700',fontSize:'16px'}}>{w.korean}</span>
                  <span style={{color:'#64748b',fontSize:'13px'}}>{w.chinese}</span>
                  {w.pos&&<span style={{fontSize:'10px',background:'#e0f2fe',color:'#0284c7',padding:'1px 6px',borderRadius:'999px'}}>{w.pos}</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:'6px'}} onClick={e=>e.stopPropagation()}>
                <WordButtons word={w} small />
              </div>
            </div>
            {expandedId===w.id&&<div className="fade-in" style={{marginTop:'8px',paddingTop:'8px',borderTop:'1px solid #f0f9ff',fontSize:'12px',color:'#64748b'}}>
              {w.hint&&<div>發音提示：{w.hint}</div>}
              {w.example&&<div className="korean">{w.example}{w.exampleCn&&<span style={{color:'#94a3b8'}}> （{w.exampleCn}）</span>}</div>}
              {w.note&&<div style={{color:'#94a3b8'}}>備註：{w.note}</div>}
              <div style={{color:'#cbd5e1',fontSize:'11px'}}>來源：{w.source} ／ 分類：{w.category}</div>
            </div>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ============ WRONG ANSWER LIST ============

  );
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
        <span style={{fontSize:'13px',color:'#64748b'}}>共 <strong style={{color:'#e11d48'}}>{wrongList.length}</strong> 個錯題</span>

          重新練習錯題
        </button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:'8px'}}>
        {wrongList.map(w=>(
          <div key={w.id} style={{background:'white',borderRadius:'12px',border:'1px solid #fee2e2',padding:'12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap',marginBottom:'6px'}}>
                  <span className="korean" style={{fontWeight:'700',fontSize:'18px'}}>{w.korean}</span>
                  <span style={{color:'#64748b',fontSize:'13px'}}>{w.chinese}</span>
                  {w.pos&&<span style={{fontSize:'10px',background:'#e0f2fe',color:'#0284c7',padding:'1px 6px',borderRadius:'999px'}}>{w.pos}</span>}
                  <span style={{fontSize:'10px',background:'#fee2e2',color:'#e11d48',padding:'1px 6px',borderRadius:'999px'}}>答錯 {w.count} 次</span>
                </div>
                <WordButtons word={w} small />

              <button onClick={()=>onRemove(w.id)} style={{color:'#cbd5e1',fontSize:'20px',lineHeight:1,padding:'0 4px',cursor:'pointer'}}>×</button>

      </div>

  );
}

// ============ PROGRESS CARD ============
function ProgressCard({todayStats,todayAcc,learnedCount,wrongCount}) {
  const stats = [
    {label:'今日練習',value:todayStats.answered,icon:'📝',bg:'#eff6ff',text:'#1d4ed8'},
    {label:'今日正確率',value:todayStats.answered>0?`${todayAcc}%`:'—',icon:'🎯',bg:'#ecfdf5',text:'#047857'},
    {label:'已學單字',value:`${learnedCount}/${VOCAB_DATA.length}`,icon:'📚',bg:'#f5f3ff',text:'#6d28d9'},
    {label:'錯題數',value:wrongCount,icon:'❌',bg:'#fff1f2',text:'#be123c'},
  ];
  return (
    <div style={{background:'white',borderRadius:'16px',border:'1px solid #e0f2fe',padding:'20px',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
      <div style={{fontSize:'14px',fontWeight:'600',color:'#475569',marginBottom:'12px',display:'flex',alignItems:'center',gap:'6px'}}>📊 學習進度</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'12px'}}>
        {stats.map(s=>(
          <div key={s.label} style={{background:s.bg,borderRadius:'12px',padding:'12px',textAlign:'center'}}>
            <div style={{fontSize:'22px',marginBottom:'2px'}}>{s.icon}</div>
            <div style={{fontSize:'20px',fontWeight:'700',color:s.text}}>{s.value}</div>
            <div style={{fontSize:'11px',color:'#94a3b8',marginTop:'1px'}}>{s.label}</div>
          </div>
        ))}
      </div>
      {todayStats.answered>0&&<>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'11px',color:'#94a3b8',marginBottom:'4px'}}>
          <span>今日正確率</span><span>{todayAcc}%</span>
        </div>
        <div style={{height:'6px',background:'#e0f2fe',borderRadius:'999px',overflow:'hidden'}}>
          <div style={{height:'100%',background:'linear-gradient(to right,#38bdf8,#3b82f6)',borderRadius:'999px',width:`${todayAcc}%`,transition:'width 0.5s'}} />
        </div>
      </>}
    </div>
  );
}

        )}

        {tab==='wrong' && (
          <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:'12px'}}>
            <WrongList wrongList={wrongList} onPractice={handleWrongPractice} onRemove={removeFromWrong} />
            {wrongList.length>0&&(
              <button onClick={()=>{ if(confirm('確定要清空錯題本嗎？')) wrongList.forEach(w=>removeFromWrong(w.id)); }}
                style={{width:'100%',padding:'8px',fontSize:'12px',color:'#94a3b8',background:'none',border:'none',cursor:'pointer',fontFamily:'inherit'}}>
                清空錯題本
              </button>
            )}
          </div>
        )}
        </div>{/* end panelStyle */}
      </div>{/* end page-scroll */}

      {/* Bottom Nav */}
      <div style={{flexShrink:0,background:'white',borderTop:'1px solid #e0f2fe',boxShadow:'0 -2px 10px rgba(0,0,0,0.06)'}}>
        <div style={{maxWidth:'640px',margin:'0 auto',display:'flex'}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{flex:1,padding:'10px 4px',display:'flex',flexDirection:'column',alignItems:'center',
                color:tab===t.id?'#0ea5e9':'#94a3b8',background:'none',border:'none',cursor:'pointer',
                fontFamily:'inherit',position:'relative',transition:'color 0.15s'}}>
              <span style={{fontSize:'20px',lineHeight:1}}>{t.icon}</span>
              <span style={{fontSize:'9px',marginTop:'3px',fontWeight:tab===t.id?'700':'400'}}>{t.label}</span>
              {tab===t.id&&<div style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',width:'24px',height:'2px',background:'#0ea5e9',borderRadius:'2px'}} />}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
